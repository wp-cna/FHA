name: Update events

on:
  schedule:
    - cron: "20 5 * * *"   # ~1:20am New York — after WPCNA's nightly refresh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh events from the WPCNA feed
        run: node scripts/update-events.mjs

      - name: Commit if changed
        run: |
          if git diff --quiet -- data/events.json; then
            echo "No changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/events.json
            git commit -m "Refresh events from WPCNA feed"
            git push
          fi
